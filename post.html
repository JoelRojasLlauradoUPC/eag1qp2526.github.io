<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrada | Blog EA G1</title>
  <meta name="description" content="Detall d'una entrada del blog de l'assignatura EA (G1)." />
  <style>
    :root{
      --bg:#f6f8ff;
      --card:#ffffff;
      --text:#0b1220;
      --muted:#3a4466;
      --line:rgba(11,18,32,.12);
      --accent:#2f66ff;
      --accent2:#0ea57a;
      --shadow: 0 12px 30px rgba(15,25,48,.10);
      --radius: 18px;
      --max: 1080px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1100px 650px at 15% -10%, rgba(47,102,255,.18), transparent 60%),
        radial-gradient(900px 600px at 95% 10%, rgba(14,165,122,.14), transparent 55%),
        radial-gradient(900px 900px at 40% 120%, rgba(47,102,255,.10), transparent 60%),
        var(--bg);
      line-height:1.6;
      min-height:100vh;
    }
    .wrap{max-width:var(--max); margin:0 auto; padding:24px}
    header{
      display:flex; align-items:flex-start; justify-content:space-between; gap:18px;
      padding:22px 20px; border:1px solid var(--line);
      border-radius:var(--radius); background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
      box-shadow:var(--shadow); backdrop-filter: blur(10px);
    }
    .brand h1{margin:0; font-size:22px; letter-spacing:.2px}
    .brand p{margin:8px 0 0 0; color:var(--muted)}
    .back{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.82);
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      white-space:nowrap;
    }
    .grid{
      display:grid;
      grid-template-columns: 1.35fr .65fr;
      gap:18px;
      margin-top:18px;
    }
    @media (max-width: 920px){
      .grid{grid-template-columns:1fr}
      header{flex-direction:column}
    }
    main, aside{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.78);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    article{padding:20px}
    h2{margin:0 0 10px 0; font-size:28px; line-height:1.2}
    .meta{color:var(--muted); font-size:14px; margin-bottom:14px}
    .tags{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px}
    .tag{
      display:inline-flex; align-items:center;
      padding:4px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.9);
      color:var(--muted);
      font-size:12px;
    }
    .hero{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      margin:4px 0 18px 0;
      display:none;
      object-fit:cover;
      max-height:420px;
      background:#fff;
    }
    .prose p{margin:0 0 14px 0}
    .prose p:last-child{margin-bottom:0}
    .panel{padding:16px 18px; border-bottom:1px solid var(--line)}
    .panel:last-child{border-bottom:0}
    .panel h3{margin:0 0 10px 0; font-size:14px; color:var(--muted); font-weight:650}
    .list{display:flex; flex-direction:column; gap:10px}
    .item{
      display:flex; flex-direction:column; gap:4px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,.86);
      text-decoration:none;
      color:inherit;
    }
    .item strong{font-size:14px}
    .item span{color:var(--muted); font-size:12px}
    .status{padding:20px; color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>Blog assignatura EA - G1</h1>
        <p>Detall de l'entrada</p>
      </div>
      <a class="back" href="./index.html">← Tornar al blog</a>
    </header>

    <div class="grid">
      <main>
        <article id="postDetail">
          <p class="status">Carregant entrada...</p>
        </article>
      </main>

      <aside>
        <div class="panel">
          <h3>Altres entrades</h3>
          <div class="list" id="altresEntrades"></div>
        </div>

        <div class="panel">
          <h3>Etiquetes</h3>
          <div class="list" id="tagsList"></div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const $ = (s, r=document) => r.querySelector(s);

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function formatDate(iso){
      if(!iso) return "";
      const d = new Date(iso + "T00:00:00");
      return new Intl.DateTimeFormat("ca-ES", { year:"numeric", month:"long", day:"numeric" }).format(d);
    }

    function postUrl(id){
      return `post.html?id=${encodeURIComponent(String(id || ""))}`;
    }

    function resolveImagePath(p){
      const raw = String(p.imatge || "").trim();
      if(!raw) return "";
      if(raw.includes("/")) return raw;
      return `resources/posts/images/${raw}`;
    }

    function textBlocks(p){
      if(Array.isArray(p.text) && p.text.length){
        return p.text.map(x => String(x));
      }
      if(typeof p.preview === "string" && p.preview.trim()){
        return [p.preview.trim()];
      }
      return ["Aquesta entrada encara no té contingut publicat."];
    }

    function renderDetail(p){
      const imgPath = resolveImagePath(p);
      const tags = (p.etiquetes || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(" ");
      const paragraphs = textBlocks(p).map(par => `<p>${escapeHtml(par)}</p>`).join("");

      $("#postDetail").innerHTML = `
        <h2>${escapeHtml(p.titol || "Entrada")}</h2>
        <p class="meta">📅 ${escapeHtml(formatDate(p.data))}</p>
        <div class="tags">${tags || '<span class="tag">sense etiqueta</span>'}</div>
        <img id="heroImg" class="hero" alt="Imatge de la publicació" />
        <div class="prose">${paragraphs}</div>
      `;

      if(imgPath){
        const img = $("#heroImg");
        img.src = imgPath;
        img.style.display = "block";
      }

      document.title = `${p.titol || "Entrada"} | Blog EA G1`;
    }

    function renderSidebar(posts, currentId){
      const others = posts.filter(p => String(p.id) !== String(currentId)).slice(0, 6);
      $("#altresEntrades").innerHTML = others.map(p => `
        <a class="item" href="${postUrl(p.id)}">
          <strong>${escapeHtml(p.titol || "Entrada")}</strong>
          <span>${escapeHtml(formatDate(p.data))}</span>
        </a>
      `).join("") || '<div class="item"><strong>No hi ha més entrades</strong><span>Publica una nova entrada per veure-la aquí.</span></div>';

      const tagSet = new Set();
      posts.forEach(p => (p.etiquetes || []).forEach(t => tagSet.add(String(t))));
      const tags = Array.from(tagSet).sort((a,b) => a.localeCompare(b, "ca"));
      $("#tagsList").innerHTML = tags.map(t => `
        <a class="item" href="index.html#inici">
          <strong>${escapeHtml(t)}</strong>
          <span>Filtra des de la pàgina principal</span>
        </a>
      `).join("") || '<div class="item"><strong>Sense etiquetes</strong><span>Encara no n\'hi ha disponibles.</span></div>';
    }

    async function init(){
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || "";
      if(!id){
        $("#postDetail").innerHTML = '<p class="status">No s\'ha indicat cap entrada. Torna al blog principal.</p>';
        return;
      }

      const res = await fetch("./posts.json", { cache:"no-store" });
      if(!res.ok) throw new Error("Error carregant posts.json");
      const posts = await res.json();
      const list = Array.isArray(posts) ? posts : [];
      const current = list.find(p => String(p.id) === String(id));

      if(!current){
        $("#postDetail").innerHTML = '<p class="status">No s\'ha trobat aquesta entrada. Torna al blog principal.</p>';
        renderSidebar(list, id);
        return;
      }

      renderDetail(current);
      renderSidebar(list, id);
    }

    init().catch(() => {
      $("#postDetail").innerHTML = '<p class="status">Error carregant l\'entrada. Comprova que posts.json existeix i que estàs servint la web amb un servidor.</p>';
    });
  </script>
</body>
</html>
